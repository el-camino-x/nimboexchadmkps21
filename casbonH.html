<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casbon History</title>

<link rel="icon" href="https://i.postimg.cc/NM2wYX5f/image-Photoroom.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body, html {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow-x: hidden;
  background: transparent;
}

.video-bg {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

.header-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #222;
  padding: 10px 20px;
  border-bottom: 2px solid #ffd700;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-nav .logo img {
  height: 50px;
  border-radius: 10px;
}

.nav-list {
  list-style: none;
  display: flex;
}

.nav-list li a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  padding: 5px 10px;
}

.nav-list li a:hover {
  background: #ffd700;
  color: black;
  border-radius: 5px;
}

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 20px;
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}

.search-bar {
  width: 100%;
  max-width: 420px;
  display: block;
  margin: 0 auto 15px auto;

  padding: 14px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;

  color: #fff;
  font-size: 14px;

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  outline: none;
  transition: 0.25s ease;

  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.search-bar:focus {
  border: 1px solid rgba(255,215,0,0.6);
  box-shadow: 0 0 0 3px rgba(255,215,0,0.15),
              0 10px 30px rgba(0,0,0,0.4);
  transform: translateY(-2px);
}

.card-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.card {
  position: relative;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  overflow: hidden;
  background: rgba(0,0,0,0.6);
}

.card.ongoing::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 12px;

  background: linear-gradient(
  90deg,
  #ffd700,
  #ffb347,
  #ff69b4,
  #ff4fd8,
  #ffd700
);

  background-size: 300% 300%;
  animation: borderMove 4s linear infinite;

  z-index: -1;
}

.filter-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.filter-btn {
  padding: 8px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s ease;
  backdrop-filter: blur(10px);
}

.filter-btn:hover {
  transform: translateY(-2px);
  border-color: rgba(255,215,0,0.5);
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

.filter-btn.active::after {
  content: "";
  position: absolute;
  bottom: -3px;
  left: 20%;
  width: 60%;
  height: 2px;
  background: #ffd700;
  border-radius: 10px;
  opacity: 0.8;
}

.card.ongoing::after {
  content: "";
  position: absolute;
  inset: 1px;
  background: rgba(0,0,0,0.65);
  border-radius: 11px;
  z-index: -1;
}

.card.done {
  background: rgba(0, 255, 136, 0.12);
  border: 1px solid rgba(0, 255, 136, 0.4);
}

.card:hover {
  transform: scale(1.03);
}

.card h3 {
  margin: 0 0 8px 0;
  color: #ffd700;
}

.ongoing-text {
  font-weight: 700;
  color: #ffd700;
  animation: glowBlink 1.5s infinite alternate;
  text-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700, 0 0 20px #ffb700;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-box {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  width: 350px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid rgba(255,255,255,0.2);
}

.hidden {
  display: none;
}

#closeModal {
  cursor: pointer;
  float: right;
  font-size: 18px;
}

/* ANIMATIONS */
@keyframes borderMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes glowBlink {
  0% {
    opacity: 0.6;
    text-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700;
  }
  100% {
    opacity: 1;
    text-shadow: 0 0 10px #ffd700, 0 0 25px #ffd700, 0 0 40px #ffb700;
  }
}

@media (max-width: 768px) {
  .card-container {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4">
</video>

<div class="overlay"></div>

<header class="header-nav">
  <div class="logo">
    <a href="index.html">
      <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
    </a>
  </div>

  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>
</header>

<div class="container">
  <h1>Casbon History</h1>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="ALL">ALL</button>
  <button class="filter-btn" data-filter="ON GOING">ON GOING</button>
  <button class="filter-btn" data-filter="DONE">DONE</button>
</div>

  <input type="text" id="searchInput" class="search-bar" placeholder="Search nama / code / total / jatuh tempo...">

  <div id="cardContainer" class="card-container"></div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <span id="closeModal">✕</span>
    <div id="modalContent"></div>
  </div>
</div>

<script>

let allData = [];

function getStatus(code) {
  if (!code) return "-";

  const c = code.toUpperCase();

  if (c.includes("ON GO")) return "ON GOING";
  if (c === "DONE") return "DONE";

  return c;
}

function getStatusLabel(code) {
  return getStatus(code);
}

fetch('https://script.google.com/macros/s/AKfycbzv-ODJ8LCwXPY5ZndkFpg4eP4pVtGzbripVLzo3jJ-pmHj0bW4U5HL5guDnpcUfzjcsA/exec')
.then(res => res.json())
.then(data => {

  allData = data;

  allData.sort((a, b) => {

    const A = getStatus(a.code);
    const B = getStatus(b.code);

    if (A === "DONE" && B !== "DONE") return 1;
    if (A !== "DONE" && B === "DONE") return -1;

    return new Date(a.jatuhTempo) - new Date(b.jatuhTempo);
  });

  renderCards(allData);
});

function formatRp(val) {
  return val ? "Rp" + Number(val).toLocaleString("id-ID") : "-";
}

function renderCards(data) {
  const container = document.getElementById("cardContainer");
  container.innerHTML = "";

  data.forEach(item => {

    const status = getStatus(item.code);

    const card = document.createElement("div");
    card.className = "card";

    if (status === "ON GOING") card.classList.add("ongoing");
    if (status === "DONE") card.classList.add("done");

    card.innerHTML = `
      <h3>${item.nama}</h3>

      <p>
        <b>CASBON:</b>
        <span class="${status === "ON GOING" ? "ongoing-text" : ""}">
          ${getStatusLabel(item.code)}
        </span>
      </p>

      <p><b>TOTAL:</b> ${formatRp(item.total)}</p>
      <p><b>JATUH TEMPO:</b> ${item.jatuhTempo}</p>
    `;

    card.onclick = () => openModal(item);

    container.appendChild(card);
  });
}

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const closeModal = document.getElementById("closeModal");

function openModal(item) {

  const tgl = item.tanggal ? item.tanggal.split("T")[0] : "-";
  const jam = item.jam ? item.jam.split("T")[1].split(".")[0] : "-";

  const rp = v => v ? "Rp" + Number(v).toLocaleString("id-ID") : "-";
  const usd = v => v ? "$" + Number(v).toLocaleString("en-US",{minimumFractionDigits:2}) : "-";
  const pct = v => v ? (Number(v)*100).toFixed(0) + "%" : "-";

  const status = getStatus(item.code);

  let color = status === "DONE" ? "#00ff88" : "#ffd700";

  modalContent.innerHTML = `
    <p><b>TANGGAL:</b> ${tgl}</p>
    <p><b>JAM:</b> ${jam}</p>

    <p><b>CODE:</b> <span style="color:${color};font-weight:700">${getStatusLabel(item.code)}</span></p>

    <p><b>NAMA:</b> ${item.nama}</p>
    <p><b>RATE:</b> ${rp(item.rate)}</p>
    <p><b>TOTAL IN DOLLAR:</b> ${usd(item.totalDollar)}</p>
    <p><b>TOTAL IN RUPIAH:</b> ${rp(item.totalRupiah)}</p>
    <p><b>BENTUK BUNGA:</b> ${item.bentukBunga}</p>
    <p><b>BUNGA RUPIAH:</b> ${rp(item.bungaRupiah)}</p>
    <p><b>CURRENCY:</b> ${item.currency}</p>
    <p><b>BUNGA:</b> ${pct(item.bunga)}</p>
    <p><b>JATUH TEMPO:</b> ${item.jatuhTempo}</p>
  `;

  modal.classList.remove("hidden");
}

closeModal.onclick = () => modal.classList.add("hidden");

modal.onclick = (e) => {
  if (e.target === modal) modal.classList.add("hidden");
};

document.getElementById("searchInput").addEventListener("input", function () {

  const k = this.value.toLowerCase();

  const filtered = allData.filter(i =>
    (i.nama && i.nama.toLowerCase().includes(k)) ||
    (i.code && i.code.toLowerCase().includes(k)) ||
    (String(i.total).includes(k)) ||
    (i.jatuhTempo && i.jatuhTempo.toLowerCase().includes(k))
  );

  renderCards(filtered);
});

let currentFilter = "ALL";

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function () {

    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");

    currentFilter = this.dataset.filter;

    applyFilter();
  });
});

function applyFilter() {
  const k = document.getElementById("searchInput").value.toLowerCase();

  let filtered = allData.filter(i =>
    (i.nama && i.nama.toLowerCase().includes(k)) ||
    (i.code && i.code.toLowerCase().includes(k)) ||
    (String(i.total).includes(k)) ||
    (i.jatuhTempo && i.jatuhTempo.toLowerCase().includes(k))
  );

  if (currentFilter !== "ALL") {
    filtered = filtered.filter(i => {
      const status = getStatus(i.code);
      return status === currentFilter;
    });
  }

  renderCards(filtered);
}

document.getElementById("searchInput").addEventListener("input", applyFilter);

</script>

</body>
</html>
