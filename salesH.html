.filter-item button:hover {

table {

th, td {

  text-align: center;
}
th {

  position: sticky;
  top: 0;
  z-index: 1;
}
tr:hover { background: rgba(255,255,255,0.2); }

@media(max-width:1200px){

#pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 25px 0;
  gap: 10px;
}

#pagination button {

  border: 1px solid rgba(255,255,255,0.08);

  color: #fff;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(10px);
}

#pagination button:hover {
  background: rgba(255, 215, 0, 0.12);
  border-color: rgba(255, 215, 0, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(255, 215, 0, 0.15);
}

#pagination button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

#pagination span {
  padding: 8px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 13px;
  color: rgba(255,255,255,0.85);
}

.sidebar-toggle{

  top: 15px;

body.sidebar-open .sidebar-toggle{

}

}

.sidebar.active{

.sidebar-header{

  color: #ffd700;

.sidebar-close{

.sidebar-close:hover{

.menu-title{

.submenu{

.submenu a{

.submenu a:hover{

.table-wrapper {

  padding: 0 10px;
  box-sizing: border-box;

<header class="header-nav">
  <div class="logo">

</div>
  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
    </ul>

</header>

<div class="container">
  <h1>Sales Transaction</h1>

  <div class="filter-group">

    <div class="filter-item">
      <label for="filter-nama">Filter Nama</label>
      <input type="text" id="filter-nama" placeholder="Masukkan nama...">
    </div>

    <div class="filter-row">
      <div class="filter-item">
        <label for="filter-agent">Filter Agent</label>
        <select id="filter-agent">
          <option value="">All Agent</option>
        </select>
      </div>
    </div>

    <div class="filter-row">

      <div class="filter-item">
        <label for="filter-start">Start Date</label>
        <input type="date" id="filter-start">
      </div>

      <div class="filter-item">
        <label for="filter-end">End Date</label>

      <button id="reset-filter">Reset Filter</button>
    </div>

  </div>



</div>

  <div class="table-wrapper">

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Tanggal</th>
        <th>Jam</th>
        <th>Nama</th>
        <th>Rate</th>
        <th>Dollar</th>
        <th>Agent</th>
        <th>Total</th>
        <th>Currency</th>
        <th>Modal</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
</table>
  </div>


<div id="pagination"></div>
</div>

<script>
let allData = [];
let filteredData = [];

let currentPage = 1;
const itemsPerPage = 20;


function parseDateOnly(dateStr) {
  if (!dateStr) return null;

  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;

  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');

  return `${year}-${month}-${day}`;
}


fetch('https://script.google.com/macros/s/AKfycbyMF5FhpYhtFOgVVa_0YWpMkuZj-nWFpaFmqEJCv9VZTWTSnVtQVXyv9W1X4EyP2Wp5/exec')
  .then(res => res.json())
  .then(data => {

    console.log("RAW DATA:", data); 

    allData = data || [];

    allData.sort((a, b) => {
      const A = parseDateOnly(a.tanggal) || "0000-00-00";
      const B = parseDateOnly(b.tanggal) || "0000-00-00";
      return B.localeCompare(A);
    });

    populateAgentDropdown();

    filteredData = allData;
    currentPage = 1;

    render();
  })
  .catch(err => console.error('FETCH ERROR:', err));


function renderTable(data) {
  const tbody = document.getElementById('history-body');
  tbody.innerHTML = '';

  data.forEach((item, index) => {

    const realIndex = (currentPage - 1) * itemsPerPage + index + 1;

    let tanggal = new Date(item.tanggal);
    let options = { day: 'numeric', month: 'short', year: 'numeric' };

    let tanggalFormatted = isNaN(tanggal.getTime())
      ? '-'
      : tanggal.toLocaleDateString('en-GB', options).replace(/ /g, ' ');

    let jam = new Date(item.jam);
    let jamFormatted = isNaN(jam.getTime())
      ? '-'
      : jam.toLocaleTimeString('en-GB', { hour12: false });

    let rateFormatted = (item.rate / 1000).toFixed(3);
    let dollarFormatted = `$${item.dollar}`;
    let totalFormatted = Number(item.total).toLocaleString('id-ID');
    let modalFormatted = (item.modal / 1000).toFixed(3);

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${realIndex}</td>
      <td>${tanggalFormatted}</td>
      <td>${jamFormatted}</td>
      <td>${item.nama}</td>
      <td>${rateFormatted}</td>
      <td>${dollarFormatted}</td>
      <td>${item.agent}</td>
      <td>${totalFormatted}</td>
      <td>${item.currency}</td>
      <td>${modalFormatted}</td>
    `;

    tbody.appendChild(tr);
  });
}


function populateAgentDropdown() {
  const agentSelect = document.getElementById('filter-agent');
  agentSelect.innerHTML = `<option value="">All Agent</option>`;

  const agents = [...new Set(allData.map(item => item.agent))];

  agents.forEach(agent => {
    const option = document.createElement('option');
    option.value = agent.toLowerCase();
    option.textContent = agent;
    agentSelect.appendChild(option);
  });
}


document.getElementById('filter-nama').addEventListener('input', filterData);
document.getElementById('filter-agent').addEventListener('change', filterData);
document.getElementById('filter-start').addEventListener('change', filterData);
document.getElementById('filter-end').addEventListener('change', filterData);

function filterData() {

  const namaVal = document.getElementById('filter-nama').value.toLowerCase();
  const agentVal = document.getElementById('filter-agent').value.toLowerCase();
  const startVal = document.getElementById('filter-start').value;
  const endVal = document.getElementById('filter-end').value;

  filteredData = allData.filter(item => {

    const tanggalISO = parseDateOnly(item.tanggal);

    if (!tanggalISO) return false;

    const matchNama = item.nama.toLowerCase().includes(namaVal);
    const matchAgent = item.agent.toLowerCase().includes(agentVal);

    let matchDate = true;

    if (startVal && tanggalISO < startVal) matchDate = false;
    if (endVal && tanggalISO > endVal) matchDate = false;

    return matchNama && matchAgent && matchDate;
  });

  currentPage = 1;
  render();
}

document.getElementById('reset-filter').addEventListener('click', () => {
  document.getElementById('filter-nama').value = '';
  document.getElementById('filter-agent').value = '';
  document.getElementById('filter-start').value = '';
  document.getElementById('filter-end').value = '';

  filteredData = allData;
  currentPage = 1;
  render();
});


function render() {
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;

  const pageData = filteredData.slice(start, end);

  renderTable(pageData);
  renderPagination();
}

function renderPagination() {
  const container = document.getElementById('pagination');

  const totalPages = Math.ceil(filteredData.length / itemsPerPage);

  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = `
    <div style="display:flex;gap:10px;justify-content:center;align-items:center;margin:20px 0;">
      <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>◀ Prev</button>

      <div style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:8px;">
        Page ${currentPage} / ${totalPages}
      </div>

      <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next ▶</button>
    </div>
  `;
}

function goToPage(page) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);

  if (page < 1 || page > totalPages) return;

  currentPage = page;
  render();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const sidebar = document.getElementById('sidebar');
const toggle = document.getElementById('sidebar-toggle');
const closeBtn = document.getElementById('sidebar-close');

toggle.addEventListener('click', () => {
  sidebar.classList.add('active');
  document.body.classList.add('sidebar-open');
});

closeBtn.addEventListener('click', () => {
  sidebar.classList.remove('active');
  document.body.classList.remove('sidebar-open');
});

document.querySelectorAll('.menu-title').forEach(el => {
  el.addEventListener('click', () => {
    const parent = el.closest('.menu-item');
    if (parent) parent.classList.toggle('active');
  });
});
</script>
