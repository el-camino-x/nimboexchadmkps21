<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBO EXCHANGE FORM</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
<link rel="stylesheet" href="style.css">
</head>
  
<body>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="overlay"></div>
  
<header class="header-nav">
  <div class="logo">
    <a href="index.html">
      <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png" alt="Logo">
    </a>
  </div>
  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>
</header>
  
<div class="container">

  <h1>NIMBO EXCHANGE FORM TRANSACTION</h1>

  <form id="transaksi-form">

    <label>Nama</label>
    <input type="text" id="nama" placeholder="-" required>

    <label>Rate (Rp)</label>
    <input type="text" id="rate" placeholder="-" required>

    <label>Total Dollar ($)</label>
    <input type="text" id="usd" placeholder="-" required>

    <label>Agent</label>
    <div class="btn-group">
      <button type="button" class="agent-btn" data-agent="NICKY">NICKY</button>
      <button type="button" class="agent-btn" data-agent="MAUDY">MAUDY</button>
    </div>

    <label>Total Rupiah</label>
    <input type="text" id="total-rupiah" readonly>

    <label>Currency</label>
    <div class="btn-group">
      <button type="button" class="currency-btn" data-currency="USD">$ USD</button>
      <button type="button" class="currency-btn" data-currency="RIEL">៛ RIEL</button>
    </div>

    <label>Modal (Rp)</label>
    <input type="text" id="modal" placeholder="-" required>

    <label>Profit</label>
    <input type="text" id="profit" readonly>

    <button type="submit" id="submit-btn">Kirim</button>
  </form>

  <h2>Pending Form</h2>
  <table id="dashboard">
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Jam</th>
        <th>Nama</th>
        <th>Rate</th>
        <th>Total $</th>
        <th>Agent</th>
        <th>Total Rp</th>
        <th>Currency</th>
        <th>Modal</th>
        <th>Profit</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data akan muncul di sini -->
    </tbody>
  </table>

</div>

<script src="script.js"></script>
</body>
</html>
