<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencatatan Transaksi Dollar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>PENCATATAN TRANSAKSI</h2>

  <input id="nama" placeholder="Nama (contoh: KAEL)"><br>
  <input id="rate" type="number" placeholder="Rate (contoh: 17000)"><br>
  <input id="usd" type="number" placeholder="Total Dollar (contoh: 100)"><br>
  <input id="modal" type="number" placeholder="Modal (contoh: 16900)"><br>

  <select id="agent">
    <option value="NICKY">NICKY</option>
    <option value="MAUDY">MAUDY</option>
  </select><br>

  <select id="currency">
    <option value="USD">USD</option>
    <option value="RIEL">RIEL</option>
  </select><br>

  <button id="submitBtn">SIMPAN</button>
</div>

<script src="script.js"></script>
</body>
</html>
