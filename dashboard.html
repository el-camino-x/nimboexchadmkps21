<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimbo Dashboard</title>
<link rel="icon" href="https://i.postimg.cc/NM2wYX5f/image-Photoroom.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body, html {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow-x: hidden;
  background: transparent;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

.header-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #222;
  padding: 10px 20px;
  border-bottom: 2px solid #ffd700;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-nav .logo img {
  height: 50px;
  border-radius: 10px;
}

.nav-list {
  list-style: none;
  display: flex;
  margin: 0;
  padding: 0;
}

.nav-list li a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  padding: 5px 10px;
}

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 20px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

@media(max-width: 600px){
  .cards {
    grid-template-columns: 1fr;
  }
}

.card {
  position: relative;
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 15px;
  z-index: 1;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 1px;
  border-radius: 14px;
  background: linear-gradient(
    90deg,
    rgba(255,215,0,0.2),
    rgba(255,255,255,0.05),
    rgba(255,215,0,0.2)
  );
  background-size: 300% 300%;
  animation: moveBorder 6s linear infinite;

  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
}

@keyframes moveBorder {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #aaa;
}

.card p {
  font-size: 22px;
  font-weight: bold;
  margin-top: 10px;
}

.section-title:not(:first-of-type) {
  margin-top: 18px;
}

.profit { color: #00ff9c; }
.danger { color: #ff4d4d; }
.info { color: #4da6ff; }

.section-title {
  margin: 16px 0 8px;
  font-size: 15px;
  font-weight: 600;
  color: #f0f0f0;
  border-left: 3px solid rgba(255, 215, 0, 0.4);
  padding-left: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  min-width: 0;
}

th, td {
  padding: 6px 8px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

th {
  background: #1b1b1b;
  color: #eaeaea;
  border-bottom: 1px solid rgba(255, 215, 0, 0.18);
}

td {
  background: rgba(255,255,255,0.02);
  padding: 7px 8px;
  font-size: 13px;
  color: #e6e6e6;
}

tr:hover {
  background: rgba(255,255,255,0.15);
}

tr:hover td {
  background: rgba(255, 215, 0, 0.06);
  transition: 0.25s ease;
}

.scroll {
  overflow-x: auto;
}

</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4">
</video>

<div class="overlay"></div>

<header class="header-nav">
  <div class="logo">
    <a href="index.html">
      <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
    </a>
  </div>
  <ul class="nav-list">
    <li><a href="index.html">Home</a></li>
  </ul>
</header>

<div class="container">

  <h2>📈 Nimbo Dashboard</h2>

  <div class="cards">
    <div class="card">
      <h3>Total Assets</h3>
      <p id="assets" class="info">Rp0</p>
    </div>

    <div class="card">
      <h3>Total Profit</h3>
      <p id="profit" class="profit">Rp0</p>
    </div>

    <div class="card">
      <h3>Suntik Dana</h3>
      <p id="suntik" class="info">Rp0</p>
    </div>

    <div class="card">
      <h3>Casbon</h3>
      <p id="casbon" class="danger">Rp0</p>
    </div>
  </div>

  <div class="section-title">👤 Profit Per Orang</div>
  <div class="scroll">
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="profit-body"></tbody>
    </table>
  </div>

  <div class="section-title">💸 Suntik Dana</div>
  <div class="scroll">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Nama</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="suntik-body"></tbody>
    </table>
  </div>

  <div class="section-title">🧾 Casbon</div>
  <div class="scroll">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Nama</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="casbon-body"></tbody>
    </table>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzKSqfMqEjK5BIS9U-fpe41e4WFlhvg4I9HAhqr9vzTTNYPIkarv9mhwY2ti_731SyN/exec";

function formatRp(num){
  return "Rp" + Number(num || 0).toLocaleString("id-ID");
}

function formatDate(dateString){
  if(!dateString) return "-";

  const date = new Date(dateString);
  if(isNaN(date.getTime())) return "-";

  return date.toLocaleDateString("en-GB", {
    day: "numeric",
    month: "short",
    year: "numeric"
  });
}

fetch(API)
.then(r => r.json())
.then(data => {


  document.getElementById("assets").innerText = formatRp(data.total_assets);

  document.getElementById("profit").innerText = formatRp(
    (data.profit_per_orang || []).reduce((a,b)=>a + (b.profit || 0), 0)
  );

  document.getElementById("suntik").innerText = formatRp(data.suntik_dana_total);
  document.getElementById("casbon").innerText = formatRp(data.casbon_total);


  const profitBody = document.getElementById("profit-body");
  profitBody.innerHTML = "";

  (data.profit_per_orang || []).forEach(p=>{
    profitBody.innerHTML += `
      <tr>
        <td>${p.nama}</td>
        <td>${formatRp(p.profit)}</td>
      </tr>
    `;
  });


  const suntikBody = document.getElementById("suntik-body");
  suntikBody.innerHTML = "";

  (data.suntik_dana_list || []).forEach(s=>{
    suntikBody.innerHTML += `
      <tr>
        <td>${formatDate(s.tanggal)}</td>
        <td>${s.nama}</td>
        <td>${formatRp(s.total)}</td>
      </tr>
    `;
  });


  const casbonBody = document.getElementById("casbon-body");
  casbonBody.innerHTML = "";

  (data.casbon_list || []).forEach(c=>{
    casbonBody.innerHTML += `
      <tr>
        <td>${formatDate(c.tanggal)}</td>
        <td>${c.nama}</td>
        <td>${formatRp(c.total)}</td>
      </tr>
    `;
  });

})
.catch(err => {
  console.error("API ERROR:", err);
});

</script>

</body>
</html>
