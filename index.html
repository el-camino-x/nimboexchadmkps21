<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBO EXCHANGE - Home</title>
<link rel="icon" href="https://i.postimg.cc/NM2wYX5f/image-Photoroom.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1; 
}

.overlay {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

.home-container {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 1000px;
  margin: 60px auto;
  padding: 0 20px;
  color: #fff;
}

.logo-img {
  max-width: 350px;
  cursor: pointer;
  margin-bottom: 30px;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.logo-img:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(0,0,0,0.7);
}

h1 {
  font-size: 3rem;
  font-weight: 700;
  margin: 25px 0 10px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
}

p {
  font-size: 1.1rem;
  color: #ccc;
  margin-bottom: 40px;
}

.home-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

.home-buttons button {
  width: 280px;
  height: 90px;
  background: linear-gradient(145deg, #ffd700, #d6b500);
  border: none;
  border-radius: 15px;
  font-size: 1.1rem;
  font-weight: 600;
  color: #111;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px;
  overflow: hidden;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  line-height: 1.2;
  word-wrap: break-word;
}

.home-buttons button:hover {
  transform: translateY(-5px) scale(1.03);
  background: linear-gradient(145deg, #fff176, #ffd700);
  box-shadow: 0 14px 30px rgba(0,0,0,0.6);
  color: #222;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

@media(max-width:600px){
  h1 { font-size: 2rem; }
  .home-buttons { gap: 20px; }
  .home-buttons button { width: 230px; height: 75px; font-size: 1rem; }
}
</style>
</head>
<body>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="overlay"></div>

<div class="home-container">
  <img src="https://i.postimg.cc/Mpky0b4q/Desain-tanpa-judul-Photoroom.png" 
       alt="Logo Nimbo Exchange" 
       class="logo-img"
       onclick="location.href='index.html'">

  <h1>Selamat Datang di NIMBO EXCHANGE</h1>
  <p>Pilih menu yang ingin diakses:</p>

  <div class="home-buttons">
    <button onclick="location.href='form.html'">💰 FORM SALES</button>
    <button onclick="comingSoon()">📋 FORM CASBON</button>
    <button onclick="location.href='salesH.html'">📊 HISTORY SALES TRANSACTION</button>
    <button onclick="comingSoon()">🧾 HISTORY CASBON TRANSACTION</button>
    <button onclick="comingSoon()">📈 MONTHLY PROFIT</button>
    <button onclick="comingSoon()">🏦 BALANCE BANK</button>
    <button onclick="comingSoon()">👥 CUSTOMER LISTING</button>
  </div>
</div>

<script>
function comingSoon() {
  alert("Coming Soon 😎");
}
</script>

</body>
</html>
