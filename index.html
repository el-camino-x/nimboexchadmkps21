<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NIMBO EXCHANGE - Home</title>
<link rel="icon" href="https://i.postimg.cc/NM2wYX5f/image-Photoroom.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1; 
}


.overlay {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

.home-container {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 1000px;
  margin: 60px auto;
  padding: 0 20px;
  color: #fff;

  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

  
.logo-img {
  max-width: 350px;
  cursor: pointer;
  margin-bottom: 30px;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.logo-img:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(0,0,0,0.7);
}

h1 {
  font-size: 3rem;
  font-weight: 700;
  margin: 25px 0 10px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
}

p {
  font-size: 1.1rem;
  color: #ccc;
  margin-bottom: 40px;
}

.home-buttons {
  display: grid;
  grid-template-columns: repeat(2, max-content); 
  gap: 15px; 
  justify-content: center;
}


.home-buttons button {
  width: 100%;
  max-width: 200px;
  height: 70px;
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  border: none;
  border-radius: 15px;
  font-size: 1rem;
  font-weight: 600;
  color: #111;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 5px;
  overflow: hidden;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  line-height: 1.2;
  word-wrap: break-word;
}

.home-buttons button:hover {
  transform: translateY(-5px) scale(1.03);
  background: linear-gradient(145deg, #FFE066, #FF85C1);
  box-shadow: 0 14px 30px rgba(0,0,0,0.6);
  color: #222;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

.footer {
  position: relative; 
  margin-top: 40px;
  width: 100%;
  text-align: center;
  color: #aaa;
  font-size: 0.8rem;
  opacity: 0.7;
}

@media(max-width:600px){
  h1 { font-size: 2rem; }
  .home-buttons { gap: 20px; }
  .home-buttons button { width: 230px; height: 75px; font-size: 1rem; }
}

.home-buttons button.ready {
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  color: #111;
  cursor: pointer;
}

.home-buttons button.coming {
  background: linear-gradient(145deg, #bbb, #eee);
  color: #666;
  cursor: default;
  filter: grayscale(20%);
}

.home-buttons button.coming:hover {
  transform: none;
  box-shadow: none;
}

.running-text {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  box-sizing: border-box;
  border-top: 1px solid rgba(255,255,255,0.2); 
  border-bottom: 1px solid rgba(255,255,255,0.2); 
  margin: 15px 0;
}

.running-text span {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 15s linear infinite;
  font-size: 1.2rem;
  font-weight: 700;

  background: linear-gradient(90deg, #FFD700, #FF69B4, #FFA500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 3px #FFD700,
    0 0 6px #FF69B4,
    0 0 9px #FFA500;
}

@keyframes scrollText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

</style>
</head>
<body>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="overlay"></div>

<div class="home-container">
  <img src="https://i.postimg.cc/Mpky0b4q/Desain-tanpa-judul-Photoroom.png" 
       alt="Logo Nimbo Exchange" 
       class="logo-img"
       onclick="location.href='index.html'">

<div class="running-text">
  <span>💰 REZEKI GA KEMANA, TAPI KALAU GA JUALAN YA GA DAPET 💰</span>
</div>


  <h1>NIMBO EXCHANGE PANEL</h1>
  <p>Pilih menu yang ingin diakses:</p>

<div class="home-buttons">
  <button class="ready" onclick="location.href='form.html'">💰 FORM SALES</button>
  <button class="coming" onclick="comingSoon()">📋 FORM CASBON</button>
  <button class="ready" onclick="location.href='salesH.html'">📊 HISTORY SALES</button>
  <button class="coming" onclick="comingSoon()">🧾 HISTORY CASBON</button>
  <button class="ready" onclick="location.href='balance.html'">🏦 BALANCE BANK</button>
  <button class="ready" onclick="location.href='dashboard.html'">📈 DASHBOARD</button>
  <button class="ready" onclick="location.href='customerlist.html'">👥 CUSTOMER LISTING</button>
  <button class="ready" onclick="window.open('https://tinyurl.com/nimboexch', '_blank')">🌐 WEBSITE</button>
</div>


<script>
function comingSoon() {
  alert("Coming Soon");
}
</script>

</body>
<footer class="footer">
  © 2026 NIMBO EXCHANGE
</footer>

</html>
