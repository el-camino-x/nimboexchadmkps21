<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NIMBO EXCHANGE - Home</title>
<link rel="icon" href="https://i.postimg.cc/NM2wYX5f/image-Photoroom.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1; 
}


.overlay {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

.home-container {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 1000px;
  margin: 60px auto;
  padding: 0 20px;
  color: #fff;

  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

  
.logo-img {
  max-width: 350px;
  cursor: pointer;
  margin-bottom: 30px;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.logo-img:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(0,0,0,0.7);
}

h1 {
  font-size: 3rem;
  font-weight: 700;
  margin: 25px 0 10px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
}

p {
  font-size: 1.1rem;
  color: #ccc;
  margin-bottom: 40px;
}

.home-buttons {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 15px;
  max-width: 500px;
  margin: 0 auto;
}

@media (max-width: 500px) {
  .home-buttons {
    grid-template-columns: 1fr;
    justify-items: center;
  }

  .home-buttons button {
    width: 90%;
    max-width: 260px;
  }
}


.home-buttons button {
  width: 100%;
  max-width: 200px;
  height: 70px;
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  border: none;
  border-radius: 15px;
  font-size: 1rem;
  font-weight: 600;
  color: #111;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 5px;
  overflow: hidden;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  line-height: 1.2;
  word-wrap: break-word;
}

.home-buttons button:hover {
  transform: translateY(-5px) scale(1.03);
  background: linear-gradient(145deg, #FFE066, #FF85C1);
  box-shadow: 0 14px 30px rgba(0,0,0,0.6);
  color: #222;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

.footer {
  position: relative; 
  margin-top: 40px;
  width: 100%;
  text-align: center;
  color: #aaa;
  font-size: 0.8rem;
  opacity: 0.7;
}

@media(max-width:600px){
  h1 { font-size: 2rem; }
  .home-buttons { gap: 20px; }
  .home-buttons button { width: 230px; height: 75px; font-size: 1rem; }
}

.home-buttons button.ready {
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  color: #111;
  cursor: pointer;
}

.home-buttons button.coming {
  background: linear-gradient(145deg, #bbb, #eee);
  color: #666;
  cursor: default;
  filter: grayscale(20%);
}

.home-buttons button.coming:hover {
  transform: none;
  box-shadow: none;
}

.running-text {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  box-sizing: border-box;
  border-top: 1px solid rgba(255,255,255,0.2); 
  border-bottom: 1px solid rgba(255,255,255,0.2); 
  margin: 15px 0;
}

.running-text span {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 15s linear infinite;
  font-size: 1.2rem;
  font-weight: 700;

  background: linear-gradient(90deg, #FFD700, #FF69B4, #FFA500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 3px #FFD700,
    0 0 6px #FF69B4,
    0 0 9px #FFA500;
}

@keyframes scrollText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

#lockScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  color: #fff;
  text-align: center;
}

/* container biar rapi */
.lock-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  padding: 30px;
}

/* logo */
.lock-logo {
  width: 140px;
  height: auto;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* input password */
#passInput {
  padding: 12px 15px;
  width: 220px;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 1rem;
}

/* button enter */
.lock-btn {
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.lock-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* error text */
#error {
  color: #ff4d4d;
  font-size: 0.9rem;
}

.lock-video-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* dark overlay biar teks kebaca */
#lockScreen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

.lock-box {
  position: relative;
  z-index: 2;
}

.pin-input {
  padding: 12px;
  width: 180px;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 1.5rem;
  letter-spacing: 5px; 
  color: black;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.3s;
}

.pin-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  width: 100%;
}

.pin-box {
  width: 45px;
  height: 55px;
  text-align: center;
  font-size: 1.5rem;
  border-radius: 10px;
  border: none;
  outline: none;
  color: BLACK;
  flex: 0 0 auto; 
}

.pin-container {
  flex-wrap: nowrap;
}

</style>
</head>
<body>

<div id="lockScreen">

<video autoplay muted loop playsinline class="lock-video-bg">
  <source src="https://cdn.pixabay.com/video/2024/03/20/204888-925552628_large.mp4" type="video/mp4">
</video>

  <div class="lock-box">

    <img src="https://i.postimg.cc/Mpky0b4q/Desain-tanpa-judul-Photoroom.png" 
         class="lock-logo">

<div class="pin-container">
  <input type="password" maxlength="1" class="pin-box">
  <input type="password" maxlength="1" class="pin-box">
  <input type="password" maxlength="1" class="pin-box">
  <input type="password" maxlength="1" class="pin-box">
  <input type="password" maxlength="1" class="pin-box">
  <input type="password" maxlength="1" class="pin-box">
</div>

    <p id="error"></p>

  </div>

</div>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="overlay"></div>

<div class="home-container">
  <img src="https://i.postimg.cc/Mpky0b4q/Desain-tanpa-judul-Photoroom.png" 
       alt="Logo Nimbo Exchange" 
       class="logo-img"
       onclick="location.href='index.html'">

<div class="running-text">
  <span>💰 REZEKI GA KEMANA, TAPI KALAU GA JUALAN YA GA DAPET 💰</span>
</div>


  <h1>NIMBO EXCHANGE PANEL</h1>
  <p>Pilih menu yang ingin diakses:</p>

<div class="home-buttons">
  <button class="ready" onclick="location.href='form.html'">💰 FORM SALES</button>
  <button class="ready" onclick="location.href='formcas.html'">📋 FORM CASBON</button>
  <button class="ready" onclick="location.href='salesH.html'">📊 HISTORY SALES</button>
  <button class="ready" onclick="location.href='casbonH.html'">🧾 HISTORY CASBON</button>
  <button class="ready" onclick="location.href='balance.html'">🏦 BALANCE BANK</button>
  <button class="ready" onclick="location.href='dashboard.html'">📈 DASHBOARD</button>
  <button class="ready" onclick="location.href='customerlist.html'">👥 CUSTOMER LISTING</button>
  <button class="ready" onclick="window.open('https://tinyurl.com/nimboexch', '_blank')">🌐 WEBSITE</button>
</div>


<script>
function comingSoon() {
  alert("Coming Soon");
}

const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    input.value = input.value.replace(/\D/g, "");

    if (input.value && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }

    const pass = Array.from(inputs).map(i => i.value).join("");
    if (pass.length === inputs.length) {
      checkPass();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) {
      inputs[index - 1].focus();
    }
  });
});

function checkPass() {
  const pass = Array.from(inputs).map(i => i.value).join("");
  const correct = "281125";

  if (pass === correct) {

    const lock = document.getElementById("lockScreen");

    lock.style.transition = "0.5s ease";
    lock.style.opacity = "0";

    setTimeout(() => {
      lock.style.display = "none";
    }, 500);

  } else {
    document.getElementById("error").innerText = "PIN salah!";

    inputs.forEach(input => input.classList.add("shake"));

    setTimeout(() => {
      inputs.forEach(input => {
        input.classList.remove("shake");
        input.value = "";
      });
      inputs[0].focus();
    }, 300);
  }
}

window.addEventListener("load", () => {
  inputs[0].focus();
});

</script>

</body>
<footer class="footer">

</footer>

</html>
