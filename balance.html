<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  background: #0b0f14;
}

.header-nav {
  display: flex;
  justify-content: space-between; 
  align-items: center;
  background: #222;
  padding: 10px 20px;
  border-bottom: 2px solid #ffd700;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-nav .logo img {
  height: 50px;   
  width: auto;
  border-radius: 10px;
}
.nav-list {
  list-style: none;
  display: flex;
  margin: 0;
  padding: 0;
}
.nav-list li a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  padding: 5px 10px;
  transition: 0.3s;
}
  
.nav-list li a:hover {
  background: #ffd700;
  color: black;

}

.container {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 10px auto 50px auto;
  padding: 0 20px;
  overflow-x: auto;
}

h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-bottom: 20px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
  color: white
}

table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  min-width: 900px;
  color: white;
}

th, td {
  padding: 12px 15px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  text-align: center;
}
th {
  background: rgba(255,255,255,0.1);
  position: sticky;
  top: 0;
  z-index: 1;
  color: white
}
tr:hover { background: rgba(255,255,255,0.2); }

@media(max-width:1200px){
  table { font-size: 0.9rem; }
}

  .sidebar-toggle{
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 10000;
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
  transition: 0.2s ease;
}

body.sidebar-open .sidebar-toggle{
  opacity: 0;
  pointer-events: none;
}

.sidebar{
  position: fixed;
  top: 0;
  left: -100%;
  width: 280px;
  height: 100vh;
  background: #0b0f14;
  border-right: 1px solid rgba(255,215,0,0.15);
  transition: 0.3s ease;
  z-index: 9999;
  padding: 20px;
}

.sidebar.active{
  left: 0;
}

.sidebar-header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ffd700;
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sidebar-close{
  cursor: pointer;
  font-size: 18px;
  color: #fff;
  opacity: 0.7;
}

.sidebar-close:hover{
  opacity: 1;
  color: #ffd700;
}

.menu-title{
  padding: 10px;
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  color: #e5e7eb;
  text-decoration: none;
  display: block;
}

.menu-title:hover{
  background: rgba(255,215,0,0.08);
  color: #ffd700;
}

.submenu{
  display: none;
  flex-direction: column;
  padding-left: 12px;
}

.menu-item.active .submenu{
  display: flex;
}

.submenu a{
  padding: 8px;
  font-size: 14px;
  color: #aaa;
  text-decoration: none;
  border-radius: 6px;
}

.submenu a:hover{
  color: #ffd700;
  background: rgba(255,255,255,0.05);
}

  
</style>
</head>
<body>

<div class="sidebar-toggle" id="sidebar-toggle">☰</div>

<div class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <span>NIMBO PANEL</span>
    <span class="sidebar-close" id="sidebar-close">✕</span>
  </div>

  <div class="menu">

    <div class="menu-item">
      <a class="menu-title" href="index.html">Dashboard</a>
    </div>

    <div class="menu-item">
      <div class="menu-title">Form</div>
      <div class="submenu">
        <a href="form.html">Sales Form</a>
        <a href="formcas.html">Casbon Form</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">History</div>
      <div class="submenu">
        <a href="salesH.html">Sales History</a>
        <a href="casbonH.html">Casbon History</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">System</div>
      <div class="submenu">
        <a href="balance.html">Balance Bank</a>
        <a href="customerlist.html">Customer Listing</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">Website</div>
      <div class="submenu">
        <a href="https://tinyurl.com/nimboexch" target="_blank" rel="noopener noreferrer">
          🌐 Nimbo Exchange
        </a>
      </div>
    </div>
    
  </div>
</div>

  
<header class="header-nav">
<div class="logo">
  <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
</div>
  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>
</header>

<div class="container">
  <h1>Balance Bank</h1>

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Bank</th>
        <th>Nama</th>
        <th>Rekening</th>
        <th>Penjualan</th>
        <th>Keuangan</th>
        <th>Casbon</th>
        <th>Saldo Akhir</th>
      </tr>
    </thead>
    <tbody id="balance-body"></tbody>
  </table>
</div>

<script>
const execURL = "https://script.google.com/macros/s/AKfycbxx5PnSWG3kL403fAuXzO3r6b7C3KtedgN30en6tLhfWmxPBtJAsN76eL7s8qScKAAe/exec";
let allData = [];

function formatNumber(num) {
  if (isNaN(num)) return 0;
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

fetch(execURL)
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderTable(allData);
  })
  .catch(err => console.error("Error fetch balance bank:", err));

function renderTable(data) {
  const tbody = document.getElementById("balance-body");
  tbody.innerHTML = "";

  data.forEach((item, index) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${index + 1}</td>
      <td>${item.bank || "-"}</td>
      <td>${item.nama || "-"}</td>
      <td>${item.rek || "-"}</td>
      <td>${formatNumber(item.penjualan)}</td>
      <td>${formatNumber(item.keuangan)}</td>
      <td>${formatNumber(item.casbon)}</td>
      <td>${formatNumber(item.saldoakhir)}</td>
    `;
    tbody.appendChild(tr);
  });
}

  const sidebar = document.getElementById('sidebar');
const toggle = document.getElementById('sidebar-toggle');
const closeBtn = document.getElementById('sidebar-close');

toggle.addEventListener('click', () => {
  sidebar.classList.add('active');
  document.body.classList.add('sidebar-open');
});

closeBtn.addEventListener('click', () => {
  sidebar.classList.remove('active');
  document.body.classList.remove('sidebar-open');
});

document.querySelectorAll('.menu-title').forEach(el => {
  el.addEventListener('click', () => {
    const parent = el.closest('.menu-item');
    if (parent) parent.classList.toggle('active');
  });
});

  
</script>

</body>
</html>
