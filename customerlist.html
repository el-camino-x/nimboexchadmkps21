<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Listing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body, html {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* VIDEO BG */
.video-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* OVERLAY FIX (biar gak block click) */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* HEADER */
.header-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(20,20,20,0.95);
  padding: 8px 16px;
  border-bottom: 2px solid #ffd700;

  position: fixed;  
  top: 0;
  left: 0;
  width: 100%;
  z-index: 999;
}

.header-nav .logo img {
  height: 45px;
  border-radius: 8px;
}

.nav-list {
  list-style: none;
  display: flex;
  gap: 10px;
  margin: 0;
  padding: 0;
}

.nav-list li a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  padding: 6px 10px;
  transition: 0.3s;
}

.nav-list li a:hover {
  background: #ffd700;
  color: black;
  border-radius: 6px;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: 90px auto 20px auto; 
  padding: 15px;
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}

/* FILTER */
.filter-wrapper {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

#search {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

.filter-row {
  display: flex;
  gap: 10px;
}

select {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

select option {
  color: #000;
}

.customer-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.customer-card:hover {
  transform: translateY(-3px);
}

.name {
  font-size: 1.2rem;
  font-weight: 700;
}

.badge {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 8px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  margin-top: 4px;
}

.back-btn {
  margin-top: 20px;
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  font-weight: 600;
  cursor: pointer;
}


</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/12/09/30016-378309079_large.mp4">
</video>

<div class="overlay"></div>

<header class="header-nav">
  <div class="logo">
    <a href="index.html">
      <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
    </a>
  </div>

  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>
</header>

<div class="container">

  <h1>👥 CUSTOMER LISTING</h1>

  <div class="filter-wrapper">

    <input type="text" id="search" placeholder="🔍 CARI NAMA...">

    <div class="filter-row">
      <select id="levelFilter">
        <option value="ALL">ALL LEVEL</option>
      </select>

      <select id="sortFilter">
        <option value="desc">💰 PROFIT TERBESAR</option>
        <option value="asc">💸 PROFIT TERKECIL</option>
      </select>
    </div>

  </div>

  <div id="customerList"></div>

  <button class="back-btn" onclick="location.href='index.html'">
    ⬅ BACK
  </button>

</div>

<script src="customer.js"></script>

</body>
</html>
