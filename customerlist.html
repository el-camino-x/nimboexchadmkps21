<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Listing</title>

<link rel="icon" href="https://i.postimg.cc/NM2wYX5f/image-Photoroom.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  

<style>

body, html {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow-x: hidden;
  background: #0b0f14;
}

.header-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 20px;
  background: #222;
  border-bottom: 2px solid #ffd700;

  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;

  box-sizing: border-box; 
}

.header-nav .logo img {
  height: 50px;
  border-radius: 10px;
}

.nav-list {
  list-style: none;
  display: flex;
  margin: 0;
  padding: 0;
}

.nav-list li a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  padding: 5px 10px;
}

.nav-list li a:hover {
  background: #ffd700;
  color: black;
  border-radius: 5px;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: 10px auto 20px auto;
  padding: 15px;
  margin-top: 49px;
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}

.filter-wrapper {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

#search {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

.filter-row {
  display: flex;
  gap: 10px;
}

select {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

select option {
  color: #000;
}

#customerList {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

@media (min-width: 768px) {
  #customerList {
    grid-template-columns: 1fr 1fr;
  }
}

.customer-card {
  background: linear-gradient(
    145deg,
    rgba(18, 18, 18, 0.95),
    rgba(10, 10, 10, 0.85)
  );

  border: 1px solid rgba(255, 215, 0, 0.18);

  backdrop-filter: blur(14px);

  border-radius: 16px;
  padding: 15px;

  box-shadow:
    0 12px 30px rgba(0,0,0,0.6),
    0 0 12px rgba(0,0,0,0.4);

  transition: 0.25s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.customer-card:hover {
  transform: translateY(-4px) scale(1.01);

  border: 1px solid rgba(255, 215, 0, 0.6);

  box-shadow:
    0 15px 35px rgba(0,0,0,0.5),
    0 0 25px rgba(255, 215, 0, 0.25);
}


.name {
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
}

.badge {
  color: #ffd700;
  text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
}

.badge {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 8px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  margin-top: 4px;
}

#pagination {
  display: flex;
  justify-content: center;
  margin: 20px 0;
}

.page-btn {
  padding: 10px 18px;
  border-radius: 12px;

  background: linear-gradient(
    145deg,
    rgba(255, 215, 0, 0.15),
    rgba(255, 215, 0, 0.05)
  );

  border: 1px solid rgba(255, 215, 0, 0.3);
  color: #ffd700;

  font-weight: 600;
  cursor: pointer;

  backdrop-filter: blur(12px);
  box-shadow:
    0 8px 20px rgba(0,0,0,0.4),
    0 0 10px rgba(255, 215, 0, 0.08);

  transition: 0.25s ease;
}

.page-btn:hover {
  transform: translateY(-3px) scale(1.03);

  background: linear-gradient(
    145deg,
    rgba(255, 215, 0, 0.25),
    rgba(255, 215, 0, 0.08)
  );

  border: 1px solid rgba(255, 215, 0, 0.6);

  box-shadow:
    0 12px 30px rgba(0,0,0,0.5),
    0 0 20px rgba(255, 215, 0, 0.25);
}

.page-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.pagination-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}

.page-info {
  font-weight: 600;
  opacity: 0.8;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  backdrop-filter: blur(6px);
}

.hidden {
  display: none;
}

.modal-content {
  background: rgba(25,25,25,0.95);
  border: 1px solid rgba(255,255,255,0.08);
  color: #fff;
  padding: 18px;
  border-radius: 18px;
  width: 92%;
  max-width: 460px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: pop 0.2s ease;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.close {
  float: right;
  cursor: pointer;
  font-size: 22px;
  opacity: 0.7;
}

.close:hover {
  opacity: 1;
}

.back-btn {
  margin-top: 20px;
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(145deg, #FFD700, #FF69B4);
  font-weight: 600;
  cursor: pointer;
}


.sidebar-toggle{
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 10000;
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
  transition: 0.2s ease;
}

body.sidebar-open .sidebar-toggle{
  opacity: 0;
  pointer-events: none;
}

.sidebar{
  position: fixed;
  top: 0;
  left: -320px;
  width: 280px;
  height: 100vh;
  background: #0b0f14;
  border-right: 1px solid rgba(255,215,0,0.15);
  transition: 0.3s ease;
  z-index: 9999;
  padding: 20px;
}

.sidebar.active{
  left: 0;
}

.sidebar-header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ffd700;
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sidebar-close{
  cursor: pointer;
  font-size: 18px;
  color: #fff;
  opacity: 0.7;
}

.sidebar-close:hover{
  opacity: 1;
  color: #ffd700;
}

.menu-title{
  padding: 10px;
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  color: #e5e7eb;
  text-decoration: none;
  display: block;
}

.menu-title:hover{
  background: rgba(255,215,0,0.08);
  color: #ffd700;
}

.submenu{
  display: none;
  flex-direction: column;
  padding-left: 10px;
}

.menu-item.active .submenu{
  display: flex;
}

.submenu a{
  padding: 8px;
  font-size: 14px;
  color: #aaa;
  text-decoration: none;
  border-radius: 6px;
}

.submenu a:hover{
  color: #ffd700;
  background: rgba(255,255,255,0.05);
}

.menu-title.active-link{
  background: rgba(255,215,0,0.12);
  color: #ffd700;
  border-left: 3px solid #ffd700;
  padding-left: 10px;
}

</style>
</head>

<body>

<div class="sidebar-toggle" id="sidebar-toggle">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <span><i class="fa-solid fa-bolt"></i> NIMBO PANEL</span>
    <span class="sidebar-close" id="sidebar-close">✕</span>
  </div>

  <div class="menu">

    <div class="menu-item">
      <a class="menu-title" href="index.html">
        <i class="fa-solid fa-house"></i> Dashboard
      </a>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-file-lines"></i> Form
      </div>
      <div class="submenu">
        <a href="form.html"><i class="fa-solid fa-sack-dollar"></i> Sales Form</a>
        <a href="formcas.html"><i class="fa-solid fa-file-invoice"></i> Casbon Form</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-clock-rotate-left"></i> History
      </div>
      <div class="submenu">
        <a href="salesH.html"><i class="fa-solid fa-chart-line"></i> Sales History</a>
        <a href="casbonH.html"><i class="fa-solid fa-receipt"></i> Casbon History</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-gear"></i> System
      </div>
      <div class="submenu">
        <a href="balance.html"><i class="fa-solid fa-building-columns"></i> Balance Bank</a>
        <a href="customerlist.html"><i class="fa-solid fa-users"></i> Customer Listing</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-globe"></i> Website
      </div>
      <div class="submenu">
        <a href="https://tinyurl.com/nimboexch" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-link"></i> Nimbo Exchange
        </a>
      </div>
    </div>

  </div>
</div>

<header class="header-nav">
<div class="logo">
  <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
</div>

  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>
</header>

<div class="container">

  <h1>👥 CUSTOMER LISTING</h1>

  <div class="filter-wrapper">

    <input type="text" id="search" placeholder="🔍 CARI NAMA...">

    <div class="filter-row">
      <select id="levelFilter">
        <option value="ALL">ALL LEVEL</option>
      </select>

      <select id="sortFilter">
        <option value="desc">💰 PROFIT TERBESAR</option>
        <option value="asc">💸 PROFIT TERKECIL</option>
      </select>
    </div>

</div>
  <div id="customerList"></div>
  <div id="pagination"></div>
  <button class="back-btn" onclick="location.href='index.html'">
    ⬅ BACK
  </button>
</div>

<div id="globalModal" class="modal hidden" onclick="outsideClick(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close" onclick="closeModal()">×</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="customerlist.js"></script>
</body>
</html>
