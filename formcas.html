<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASBON FORM - NIMBO</title>
<link rel="stylesheet" href="stylecas.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
</head>

<style>

.sidebar-toggle{
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 10000;
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
  transition: 0.2s ease;
}

body.sidebar-open .sidebar-toggle{
  opacity: 0;
  pointer-events: none;
}

.sidebar{
  position: fixed;
  top: 0;
  left: -100%;
  width: 280px;
  height: 100vh;
  background: #0b0f14;
  border-right: 1px solid rgba(255,215,0,0.15);
  transition: 0.3s ease;
  z-index: 9999;
  padding: 20px;
}

.sidebar.active{
  left: 0;
}

.sidebar-header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #ffd700;
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sidebar-close{
  cursor: pointer;
  font-size: 18px;
  color: #fff;
  opacity: 0.7;
}

.sidebar-close:hover{
  opacity: 1;
  color: #ffd700;
}

.menu-title{
  padding: 10px;
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  color: #e5e7eb;
  text-decoration: none;
  display: block;
}

.menu-title:hover{
  background: rgba(255,215,0,0.08);
  color: #ffd700;
}

.submenu{
  display: none;
  flex-direction: column;
  padding-left: 12px;
}

.menu-item.active .submenu{
  display: flex;
}

.submenu a{
  padding: 8px;
  font-size: 14px;
  color: #aaa;
  text-decoration: none;
  border-radius: 6px;
}

.submenu a:hover{
  color: #ffd700;
  background: rgba(255,255,255,0.05);
}

  
</style>
  
<body>

<div class="sidebar-toggle" id="sidebar-toggle">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <span><i class="fa-solid fa-bolt"></i> NIMBO PANEL</span>
    <span class="sidebar-close" id="sidebar-close">✕</span>
  </div>

  <div class="menu">

    <div class="menu-item">
      <a class="menu-title" href="index.html">
        <i class="fa-solid fa-house"></i> Dashboard
      </a>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-file-lines"></i> Form
      </div>
      <div class="submenu">
        <a href="form.html"><i class="fa-solid fa-sack-dollar"></i> Sales Form</a>
        <a href="formcas.html"><i class="fa-solid fa-file-invoice"></i> Casbon Form</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-clock-rotate-left"></i> History
      </div>
      <div class="submenu">
        <a href="salesH.html"><i class="fa-solid fa-chart-line"></i> Sales History</a>
        <a href="casbonH.html"><i class="fa-solid fa-receipt"></i> Casbon History</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-gear"></i> System
      </div>
      <div class="submenu">
        <a href="balance.html"><i class="fa-solid fa-building-columns"></i> Balance Bank</a>
        <a href="customerlist.html"><i class="fa-solid fa-users"></i> Customer Listing</a>
      </div>
    </div>

    <div class="menu-item">
      <div class="menu-title">
        <i class="fa-solid fa-globe"></i> Website
      </div>
      <div class="submenu">
        <a href="https://tinyurl.com/nimboexch" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-link"></i> Nimbo Exchange
        </a>
      </div>
    </div>

  </div>
</div>
  
<header class="header-nav">
  <div class="logo">
  <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png">
</div>

  <ul class="nav-list">
    <li><a href="index.html">Home</a></li>
  </ul>
</header>

<div class="container">

<h1 class="title-pro">
  FORM <span>CASBON</span>
</h1>

<form id="casbon-form">

  <label>TANGGAL</label>
  <input type="text" id="tanggal" readonly class="auto-field">

  <label>JAM</label>
  <input type="text" id="jam" readonly class="auto-field">

  <label>NAMA</label>
  <input type="text" id="nama" placeholder="-" required>

  <label>RATE (RUPIAH)</label>
  <input type="text" id="rate" required>

  <label>TOTAL DOLLAR</label>
  <input type="text" id="usd" required>

  <label>CURRENCY</label>
  <div class="currency-box">
    <button type="button" id="usd-btn" class="active">USD</button>
    <button type="button" id="riel-btn">RIEL</button>
  </div>

  <label>TOTAL RUPIAH</label>
  <input type="text" id="total-rupiah" readonly class="auto-field">

  <label>BUNGA (%)</label>
  <input type="text" id="bunga" value="0">

  <label>TOTAL BUNGA</label>
  <input type="text" id="total-bunga" readonly class="auto-field">

  <label>TOTAL YANG HARUS DIBAYAR</label>
  <input type="text" id="total-bayar" readonly class="auto-field">

  <label>JATUH TEMPO</label>
  <input type="date" id="jatuh-tempo">

  <button type="submit">KIRIM CASBON</button>

</form>

<h2 style="text-align:center; margin-top:30px;">PENDING CASBON</h2>

<table id="dashboard">
  <thead>
    <tr>
      <th>Tanggal</th>
      <th>Nama</th>
      <th>Rate</th> 
      <th>Total Dollar</th>
      <th>Bunga</th>
      <th>Total Bunga</th>
      <th>Total Bayar</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script>
  const sidebar = document.getElementById('sidebar');
const toggle = document.getElementById('sidebar-toggle');
const closeBtn = document.getElementById('sidebar-close');

toggle.addEventListener('click', () => {
  sidebar.classList.add('active');
  document.body.classList.add('sidebar-open'); 
});

closeBtn.addEventListener('click', () => {
  sidebar.classList.remove('active');
  document.body.classList.remove('sidebar-open');
});

document.querySelectorAll('.menu-title').forEach(el => {
  el.addEventListener('click', () => {
    const parent = el.closest('.menu-item');
    if (parent) parent.classList.toggle('active');
  });
});
  
</script>

  
<script src="scriptcas.js"></script>

</body>
</html>
